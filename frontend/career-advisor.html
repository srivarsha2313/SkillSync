<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SkillSync AI Career Advisor</title>

    <link rel="stylesheet" href="css/career-advisor.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="header">

        <h1>🤖 AI Career Advisor</h1>

        <p>Ask anything about careers, skills, resumes, interviews and jobs.</p>

    </div>

    <div class="chat-container">

        <div id="chatBox" class="chat-box">

            <div class="ai-message">
                👋 Hello! I'm your SkillSync AI Career Advisor.
                <br><br>
                Ask me anything about:
                <ul>
                    <li>Career Guidance</li>
                    <li>Resume Building</li>
                    <li>Interview Preparation</li>
                    <li>Projects</li>
                    <li>Certifications</li>
                    <li>Job Preparation</li>
                </ul>
            </div>

        </div>

        <div class="input-area">

            <input
                type="text"
                id="question"
                placeholder="Ask your career question...">

            <button onclick="askAI()">
                Ask AI
            </button>

        </div>

    </div>

</div>

<script src="js/career-advisor.js"></script>

</body>

</html>
