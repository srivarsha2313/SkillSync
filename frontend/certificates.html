<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SkillSync - Certificates</title>

    <link rel="stylesheet" href="css/certificates.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body onload="loadCertificates()">

<div class="container">

    <h1>🏆 My Certificates</h1>

    <input type="text" id="title" placeholder="Certificate Title">

    <input type="text" id="organization" placeholder="Organization">

    <input type="date" id="issueDate">

    <input type="text" id="certificateLink" placeholder="Certificate Link">

    <button onclick="addCertificate()">Add Certificate</button>

    <div id="certificateList"></div>

</div>

<script src="js/certificates.js"></script>

</body>

</html>
